<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C896" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <g transform="translate(130, 20)">
    <!-- Phone Screen Outer -->
    <rect width="140" height="220" rx="18" fill="#0E1624" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" />
    <!-- Notch -->
    <rect x="45" y="0" width="50" height="8" rx="4" fill="#000000" />

    <!-- Screen Content -->
    <g transform="translate(10, 15)">
      <!-- App Header -->
      <text x="0" y="15" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">My Tasks</text>
      <text x="0" y="24" font-family="sans-serif" font-size="6" fill="#94A3B8">3 of 5 tasks completed</text>

      <!-- Progress bar -->
      <rect x="0" y="30" width="120" height="4" rx="2" fill="#1E293B" />
      <rect x="0" y="30" width="72" height="4" rx="2" fill="url(#primaryGrad)" />

      <!-- Categories row -->
      <g transform="translate(0, 42)">
        <rect width="42" height="14" rx="7" fill="rgba(0, 200, 150, 0.15)" stroke="rgba(0, 200, 150, 0.3)" stroke-width="1" />
        <text x="21" y="9" font-family="sans-serif" font-size="6" font-weight="bold" fill="#00C896" text-anchor="middle">Work</text>

        <g transform="translate(46, 0)">
          <rect width="46" height="14" rx="7" fill="rgba(34, 211, 238, 0.1)" stroke="rgba(34, 211, 238, 0.15)" stroke-width="1" />
          <text x="23" y="9" font-family="sans-serif" font-size="6" fill="#22D3EE" text-anchor="middle">Personal</text>
        </g>
      </g>

      <!-- Task List -->
      <g transform="translate(0, 66)">
        <!-- Task 1 (Completed) -->
        <g transform="translate(0, 0)">
          <rect width="120" height="26" rx="6" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />
          <circle cx="12" cy="13" r="5" fill="#00C896" />
          <path d="M 10 13 L 12 15 L 15 11" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" />
          <text x="26" y="15" font-family="sans-serif" font-size="7" fill="#64748B" text-decoration="line-through">Design portfolio mockup</text>
        </g>

        <!-- Task 2 (Completed) -->
        <g transform="translate(0, 31)">
          <rect width="120" height="26" rx="6" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />
          <circle cx="12" cy="13" r="5" fill="#00C896" />
          <path d="M 10 13 L 12 15 L 15 11" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" />
          <text x="26" y="15" font-family="sans-serif" font-size="7" fill="#64748B" text-decoration="line-through">Review Cubit codebase</text>
        </g>

        <!-- Task 3 (Active) -->
        <g transform="translate(0, 62)">
          <rect width="120" height="26" rx="6" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
          <circle cx="12" cy="13" r="5" fill="none" stroke="#22D3EE" stroke-width="1" />
          <text x="26" y="15" font-family="sans-serif" font-size="7" font-weight="600" fill="#FFFFFF">Integrate REST APIs</text>
        </g>

        <!-- Task 4 (Active) -->
        <g transform="translate(0, 93)">
          <rect width="120" height="26" rx="6" fill="rgba(255, 255, 255, 0.04)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
          <circle cx="12" cy="13" r="5" fill="none" stroke="#64748B" stroke-width="1" />
          <text x="26" y="15" font-family="sans-serif" font-size="7" fill="#E2E8F0">Run benchmark checks</text>
        </g>
      </g>

      <!-- Floating Action Button -->
      <circle cx="110" cy="190" r="12" fill="url(#primaryGrad)" />
      <text x="110" y="194" font-family="sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">+</text>
    </g>
  </g>
</svg>
