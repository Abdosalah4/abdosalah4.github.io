<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>
    
    <!-- Stroke/Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C896" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Circular Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />

  <!-- Glowing Outer Ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#glowGrad)" stroke-width="3" filter="url(#glow)" opacity="0.85" />

  <!-- Code/Tech Accent Lines -->
  <path d="M 65 60 L 50 100 L 65 140" fill="none" stroke="#00C896" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />
  <path d="M 135 60 L 150 100 L 135 140" fill="none" stroke="#22D3EE" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />

  <!-- Initials -->
  <text x="100" y="112" font-family="'Poppins', 'Segoe UI', system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-1">AS</text>

  <!-- Flutter-like Diamond Badge -->
  <polygon points="100,140 106,146 100,152 94,146" fill="#00C896" opacity="0.9" />
</svg>
