<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <!-- Background and UI Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C896" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
  </defs>

  <!-- Main Card Background -->
  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Phone Mockup Container (Centered) -->
  <g transform="translate(130, 20)">
    <!-- Phone Screen Outer -->
    <rect width="140" height="220" rx="18" fill="#0B1329" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" />
    <!-- Notch -->
    <rect x="45" y="0" width="50" height="8" rx="4" fill="#000000" />

    <!-- Screen Content -->
    <g transform="translate(10, 15)">
      <!-- App Header -->
      <text x="0" y="15" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">MediMate</text>
      <circle cx="110" cy="10" r="10" fill="url(#tealGrad)" />
      <text x="110" y="13" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">+</text>

      <!-- Search bar -->
      <rect x="0" y="24" width="120" height="16" rx="8" fill="#1E293B" opacity="0.6" />
      <text x="8" y="35" font-family="sans-serif" font-size="8" fill="#64748B">Search medicine...</text>

      <!-- Section Title: Daily Reminders -->
      <text x="0" y="55" font-family="'Poppins', sans-serif" font-size="9" font-weight="600" fill="#94A3B8">TODAY'S DOSAGE</text>

      <!-- Pill Card 1 -->
      <g transform="translate(0, 62)">
        <rect width="120" height="38" rx="8" fill="rgba(34, 211, 238, 0.1)" stroke="rgba(34, 211, 238, 0.2)" stroke-width="1" />
        <rect x="6" y="8" width="22" height="22" rx="11" fill="url(#cyanGrad)" />
        <!-- Pill icon -->
        <path d="M 12 14 L 22 24 M 14 12 L 24 22" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
        <text x="34" y="18" font-family="'Poppins', sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">Aspirin</text>
        <text x="34" y="28" font-family="sans-serif" font-size="7" fill="#22D3EE">08:00 AM • 1 Pill</text>
        <!-- Checkbox -->
        <circle cx="106" cy="19" r="6" fill="#00C896" />
        <path d="M 103 19 L 105 21 L 109 17" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
      </g>

      <!-- Pill Card 2 -->
      <g transform="translate(0, 106)">
        <rect width="120" height="38" rx="8" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
        <rect x="6" y="8" width="22" height="22" rx="11" fill="#475569" />
        <path d="M 12 24 C 12 18, 22 18, 22 24 Z" fill="none" stroke="#FFFFFF" stroke-width="2" />
        <text x="34" y="18" font-family="'Poppins', sans-serif" font-size="9" font-weight="700" fill="#E2E8F0">Panadol</text>
        <text x="34" y="28" font-family="sans-serif" font-size="7" fill="#94A3B8">02:00 PM • 2 Pills</text>
        <!-- Unchecked Circle -->
        <circle cx="106" cy="19" r="6" fill="none" stroke="#64748B" stroke-width="1" />
      </g>

      <!-- Family profiles list -->
      <text x="0" y="160" font-family="'Poppins', sans-serif" font-size="9" font-weight="600" fill="#94A3B8">FAMILY PROFILES</text>
      <circle cx="10" cy="178" r="10" fill="#0284C7" />
      <circle cx="28" cy="178" r="10" fill="#EC4899" />
      <circle cx="46" cy="178" r="10" fill="#EAB308" />
      <circle cx="64" cy="178" r="10" fill="none" stroke="#475569" stroke-dasharray="2,2" />
      <text x="64" y="181" font-family="sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">+</text>
    </g>
  </g>

  <!-- Side Decorative Elements -->
  <path d="M 30 70 L 80 120" stroke="#00C896" stroke-width="2" stroke-linecap="round" opacity="0.3" stroke-dasharray="4,4" />
  <circle cx="30" cy="70" r="4" fill="#00C896" opacity="0.4" />
  <circle cx="80" cy="120" r="4" fill="#00C896" opacity="0.4" />

  <path d="M 370 190 L 320 140" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.3" stroke-dasharray="4,4" />
  <circle cx="370" cy="190" r="4" fill="#22D3EE" opacity="0.4" />
  <circle cx="320" cy="140" r="4" fill="#22D3EE" opacity="0.4" />
</svg>
