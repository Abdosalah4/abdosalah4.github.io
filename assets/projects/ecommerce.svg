<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C896" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <g transform="translate(130, 20)">
    <!-- Phone Screen Outer -->
    <rect width="140" height="220" rx="18" fill="#0B1120" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" />
    <!-- Notch -->
    <rect x="45" y="0" width="50" height="8" rx="4" fill="#000000" />

    <!-- Screen Content -->
    <g transform="translate(10, 15)">
      <!-- Search and cart header -->
      <rect x="0" y="5" width="98" height="15" rx="7.5" fill="#1E293B" opacity="0.6" />
      <text x="8" y="15" font-family="sans-serif" font-size="7" fill="#64748B">Search products...</text>
      <!-- Cart Icon -->
      <circle cx="112" cy="12" r="8" fill="rgba(34, 211, 238, 0.15)" />
      <path d="M 108 10 L 110 10 L 112 14 L 115 14" fill="none" stroke="#22D3EE" stroke-width="1" />
      <circle cx="111" cy="16" r="1.5" fill="#22D3EE" />

      <!-- Section Title -->
      <text x="0" y="36" font-family="'Poppins', sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">Discover Products</text>

      <!-- Grid of Items -->
      <g transform="translate(0, 44)">
        <!-- Item 1 -->
        <g transform="translate(0, 0)">
          <rect width="57" height="66" rx="6" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
          <!-- Product image placeholder -->
          <rect x="4" y="4" width="49" height="34" rx="4" fill="#1E293B" />
          <path d="M 20 20 L 30 30 M 38 16 A 5 5 0 1 0 38 26 Z" fill="none" stroke="#64748B" stroke-width="1" opacity="0.4"/>
          <!-- Product Details -->
          <text x="5" y="46" font-family="sans-serif" font-size="6" font-weight="600" fill="#E2E8F0">Tech Watch</text>
          <text x="5" y="58" font-family="sans-serif" font-size="7" font-weight="bold" fill="#00C896">$199</text>
          <!-- Add Button -->
          <rect x="43" y="50" width="10" height="10" rx="3" fill="#22D3EE" />
          <text x="48" y="58" font-family="sans-serif" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">+</text>
        </g>

        <!-- Item 2 -->
        <g transform="translate(63, 0)">
          <rect width="57" height="66" rx="6" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
          <!-- Product image placeholder -->
          <rect x="4" y="4" width="49" height="34" rx="4" fill="#1E293B" />
          <!-- Product Details -->
          <text x="5" y="46" font-family="sans-serif" font-size="6" font-weight="600" fill="#E2E8F0">Earbuds Pro</text>
          <text x="5" y="58" font-family="sans-serif" font-size="7" font-weight="bold" fill="#00C896">$89</text>
          <rect x="43" y="50" width="10" height="10" rx="3" fill="#22D3EE" />
          <text x="48" y="58" font-family="sans-serif" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">+</text>
        </g>
      </g>

      <!-- Promo Banner -->
      <g transform="translate(0, 118)">
        <rect width="120" height="38" rx="8" fill="url(#glowGrad)" opacity="0.9" />
        <text x="8" y="16" font-family="'Poppins', sans-serif" font-size="9" font-weight="800" fill="#0F172A">30% OFF</text>
        <text x="8" y="26" font-family="sans-serif" font-size="6" font-weight="600" fill="#0F172A">Using code: FLUTTER</text>
      </g>

      <!-- Bottom Nav Bar -->
      <g transform="translate(0, 172)">
        <rect width="120" height="24" rx="6" fill="#151F32" />
        <!-- Icons -->
        <path d="M 12 18 L 18 10 L 24 18 Z" fill="#00C896" />
        <rect x="48" y="12" width="10" height="10" rx="2" fill="none" stroke="#94A3B8" stroke-width="1.5" />
        <circle cx="84" cy="17" r="4.5" fill="none" stroke="#94A3B8" stroke-width="1.5" />
        <path d="M 106 18 A 4 4 0 1 0 110 18 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      </g>
    </g>
  </g>
</svg>
