<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="weatherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <g transform="translate(130, 20)">
    <!-- Phone Screen Outer -->
    <rect width="140" height="220" rx="18" fill="#090E1F" stroke="rgba(255, 255, 255, 0.15)" stroke-width="3" />
    <!-- Notch -->
    <rect x="45" y="0" width="50" height="8" rx="4" fill="#000000" />

    <!-- Screen Content -->
    <g transform="translate(10, 15)">
      <!-- Location header -->
      <text x="60" y="15" font-family="'Poppins', sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cairo, Egypt</text>
      <text x="60" y="24" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">Thursday, 16 July</text>

      <!-- Main Weather Icon & Temp -->
      <g transform="translate(30, 32)">
        <!-- Sun behind cloud -->
        <circle cx="45" cy="15" r="10" fill="url(#sunGrad)" />
        <path d="M 30 25 C 30 18, 40 15, 50 20 C 55 16, 65 20, 65 25 C 70 25, 75 30, 70 35 C 65 37, 30 37, 30 25 Z" fill="url(#weatherGrad)" opacity="0.9"/>
        
        <text x="30" y="55" font-family="'Poppins', sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">32°</text>
        <text x="30" y="65" font-family="sans-serif" font-size="7" font-weight="600" fill="#00C896" text-anchor="middle">Partly Cloudy</text>
      </g>

      <!-- Details row (Humidity, Wind) -->
      <g transform="translate(0, 108)">
        <rect width="120" height="26" rx="6" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
        <text x="20" y="10" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">HUMIDITY</text>
        <text x="20" y="20" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">64%</text>
        
        <line x1="60" y1="4" x2="60" y2="22" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />

        <text x="100" y="10" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">WIND</text>
        <text x="100" y="20" font-family="sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">12 km/h</text>
      </g>

      <!-- Hourly Forecast -->
      <text x="0" y="150" font-family="'Poppins', sans-serif" font-size="7" font-weight="600" fill="#94A3B8">HOURLY FORECAST</text>

      <g transform="translate(0, 156)">
        <!-- Hour 1 -->
        <rect width="26" height="34" rx="4" fill="rgba(0, 200, 150, 0.15)" stroke="rgba(0, 200, 150, 0.3)" stroke-width="1" />
        <text x="13" y="8" font-family="sans-serif" font-size="6" fill="#00C896" text-anchor="middle">Now</text>
        <circle cx="13" cy="17" r="4" fill="url(#sunGrad)" />
        <text x="13" y="28" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle">32°</text>

        <!-- Hour 2 -->
        <g transform="translate(31, 0)">
          <rect width="26" height="34" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />
          <text x="13" y="8" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">3 PM</text>
          <circle cx="13" cy="17" r="4" fill="url(#sunGrad)" />
          <text x="13" y="28" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle">33°</text>
        </g>

        <!-- Hour 3 -->
        <g transform="translate(62, 0)">
          <rect width="26" height="34" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />
          <text x="13" y="8" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">6 PM</text>
          <path d="M 10 17 C 10 15, 13 14, 16 16 C 18 16, 18 18, 18 19" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
          <text x="13" y="28" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle">29°</text>
        </g>

        <!-- Hour 4 -->
        <g transform="translate(93, 0)">
          <rect width="26" height="34" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />
          <text x="13" y="8" font-family="sans-serif" font-size="6" fill="#94A3B8" text-anchor="middle">9 PM</text>
          <path d="M 11 14 A 4 4 0 1 0 16 19 A 3 3 0 1 1 11 14" fill="#EAB308" />
          <text x="13" y="28" font-family="sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle">26°</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Decorative Cloud background -->
  <path d="M 320 80 C 320 70, 340 65, 355 72 C 360 68, 375 72, 375 80 C 382 80, 385 85, 380 90 C 375 92, 320 92, 320 80 Z" fill="#38BDF8" opacity="0.1" />
</svg>
